# lsofrs configuration — copy to ~/.lsofrs.conf
# All settings are optional; CLI flags override these values.

# Color theme (31 available: neon-sprawl, classic, solar-flare, ice-breaker,
# matrix, blade-runner, synthwave, acid-rain, ghost-wire, red-sector,
# deep-net, overlock, sakura-den, data-stream, neon-noir, chrome-heart,
# void-walker, toxic-waste, cyber-frost, plasma-core, steel-nerve,
# dark-signal, glitch-pop, holo-shift, night-city, laser-grid,
# quantum-flux, bio-hazard, darkwave, megacorp, zaibatsu)
theme = "neon-sprawl"

# Refresh interval in seconds for live modes (--top, --summary -r, --tui)
refresh_rate = 1
