name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Package
        shell: bash
        run: |
          cd target/${{ matrix.target }}/release
          for b in lsofrs lsf; do
            strip "$b" 2>/dev/null || true
          done
          tar czf ../../../lsofrs-${{ github.ref_name }}-${{ matrix.target }}.tar.gz lsofrs lsf
          cd ../../..

      - uses: actions/upload-artifact@v6
        with:
          name: lsofrs-${{ matrix.target }}
          path: lsofrs-${{ github.ref_name }}-${{ matrix.target }}.tar.gz

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/*.tar.gz

  homebrew:
    name: Update Homebrew tap
    needs: publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Compute SHA256 sums
        id: sha
        shell: bash
        run: |
          for f in artifacts/*.tar.gz; do
            base=$(basename "$f")
            sum=$(sha256sum "$f" | awk '{print $1}')
            # e.g. lsofrs-vX.Y.Z-aarch64-apple-darwin.tar.gz → aarch64_apple_darwin
            key=$(echo "$base" | sed 's/lsofrs-v[^-]*-//; s/\.tar\.gz//; s/-/_/g; s/\./_/g')
            echo "${key}=${sum}" >> "$GITHUB_OUTPUT"
          done

      - uses: actions/checkout@v6
        with:
          repository: MenkeTechnologies/homebrew-menketech
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: tap

      - name: Update formula
        shell: bash
        env:
          VERSION: ${{ github.ref_name }}
        run: |
          # Strip leading 'v' from VERSION (e.g. v1.2.3 → 1.2.3).
          VERSION="${VERSION#v}"
          cd tap
          cat > Formula/lsofrs.rb <<'FORMULA_HEAD'
          class Lsofrs < Formula
            desc "Rust rewrite of lsof — 5–21× faster, 7-tab TUI, 31 cyberpunk themes"
            homepage "https://github.com/MenkeTechnologies/lsofrs"
            license "MIT"
          FORMULA_HEAD
          cat >> Formula/lsofrs.rb <<EOF
            version "${VERSION}"

            on_macos do
            on_arm do
              url "https://github.com/MenkeTechnologies/lsofrs/releases/download/v${VERSION}/lsofrs-v${VERSION}-aarch64-apple-darwin.tar.gz"
              sha256 "${{ steps.sha.outputs.aarch64_apple_darwin }}"
            end
            on_intel do
              url "https://github.com/MenkeTechnologies/lsofrs/releases/download/v${VERSION}/lsofrs-v${VERSION}-x86_64-apple-darwin.tar.gz"
              sha256 "${{ steps.sha.outputs.x86_64_apple_darwin }}"
            end
            end

            on_linux do
            on_intel do
              url "https://github.com/MenkeTechnologies/lsofrs/releases/download/v${VERSION}/lsofrs-v${VERSION}-x86_64-unknown-linux-gnu.tar.gz"
              sha256 "${{ steps.sha.outputs.x86_64_unknown_linux_gnu }}"
            end
            end

            def install
            bin.install "lsofrs"
            bin.install "lsf"
            end

            test do
              assert_match "lsofrs", shell_output("#{bin}/lsf --version")
            end
          end
          EOF

      - name: Push formula update
        run: |
          cd tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/lsofrs.rb
          if git diff --cached --quiet; then
            echo "no changes — formula already up to date"
            exit 0
          fi
          git commit -m "lsofrs: bump to ${{ github.ref_name }}"
          git push
